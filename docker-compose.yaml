services:
  db-omop:
    image: postgres:15
    container_name: postgres_omop
    ports:
      - "5432:5432" 
    environment:
      - POSTGRES_DB=omop_db
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=admin
    volumes:
      - ./vocabulary:/vocabulary
      - ./scripts:/docker-entrypoint-initdb.d
      - postgres_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    ports:
      - "5050:80"
    environment:
      - PGADMIN_DEFAULT_EMAIL=admin@admin.com
      - PGADMIN_DEFAULT_PASSWORD=admin
    depends_on:
      - db-omop
  
  db-fhir:
    image: mongo:latest
    container_name: mongo_fhir
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=admin
      - MONGO_INITDB_ROOT_PASSWORD=admin
    volumes:
      - mongo_data:/data/db

  mongo-express:
    image: mongo-express
    container_name: mongo_express_fhir
    ports:
      - "8082:8081"
    environment:
      - ME_CONFIG_MONGODB_ADMINUSERNAME=admin
      - ME_CONFIG_MONGODB_ADMINPASSWORD=admin
      - ME_CONFIG_MONGODB_SERVER=db-fhir
      - ME_CONFIG_BASICAUTH_USERNAME=admin
      - ME_CONFIG_BASICAUTH_PASSWORD=admin
    depends_on:
      - db-fhir

  etl-service:
    build: ./etl-service
    container_name: etl-service
    ports:
      - "8090:8080"
    depends_on:
      - db-omop

  fhir-service:
    build: ./fhir-service
    container_name: fhir-service
    ports:
      - "8091:8080"
    depends_on:
      - db-fhir

  web-client:
    build: ./web-client
    container_name: web-client
    ports:
      - "80:80"
    depends_on:
      - servicio-fhir
      - servicio-etl
      
  translator-service:
    build: ./translator-service
    container_name: translator-service
    ports:
      - "8084:8080"
    environment:
      - DATABASE_URL=postgresql://admin:admin@db-omop:5432/omop_db

volumes:
  postgres_data:
  mongo_data: