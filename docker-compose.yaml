services:
  db-omop:
    image: postgres:15
    container_name: postgres_omop
    ports:
      - "5432:5432" 
    environment:
      - POSTGRES_DB=omop_db
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=admin
    volumes:
      - ./vocabulary:/vocabulary
      - ./scripts:/docker-entrypoint-initdb.d
      - postgres_data:/var/lib/postgresql/data
  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin_omop
    ports:
      - "5050:80"
    environment:
      - PGADMIN_DEFAULT_EMAIL=admin@admin.com
      - PGADMIN_DEFAULT_PASSWORD=admin
    depends_on:
      - db-omop

volumes:
  postgres_data: